version: "2"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - revive
    - misspell
    - gocyclo
    - godot

formatters:
  enable:
    - gofmt

linters-settings:
  gocyclo:
    min-complexity: 15
  revive:
    rules:
      - name: exported
        severity: warning
      - name: var-naming
        severity: warning
  godot:
    scope: declarations

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - godot
        - gocyclo
