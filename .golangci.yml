version: "2"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - revive
    - misspell
    - gocyclo
    - godot
  settings:
    gocyclo:
      min-complexity: 30
    revive:
      rules:
        - name: exported
          severity: warning
        - name: var-naming
          severity: warning
    godot:
      scope: declarations
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - godot
          - gocyclo

formatters:
  enable:
    - gofmt
