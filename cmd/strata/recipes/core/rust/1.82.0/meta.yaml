name: rust
version: "1.82.0"
tier: core
description: "Rust 1.82.0 stable toolchain — rustc, cargo, rustfmt, clippy."
abi: linux-gnu-2.34
provides:
  - name: rust
    version: "1.82.0"
  - name: cargo
    version: "1.82.0"
runtime_requires:
  - name: glibc
    min_version: "2.34"
modulefile_env:
  - var: CARGO_HOME
    path: ""
  - var: RUSTUP_HOME
    path: ".rustup"
