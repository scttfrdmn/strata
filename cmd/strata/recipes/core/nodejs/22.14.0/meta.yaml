name: nodejs
version: "22.14.0"
tier: core
description: "Node.js 22.14.0 LTS — JavaScript runtime for JupyterLab extensions and Quarto rendering."
abi: linux-gnu-2.34
provides:
  - name: nodejs
    version: "22.14.0"
  - name: npm
    version: "10.9.2"
runtime_requires:
  - name: glibc
    min_version: "2.34"

modulefile_env:
  - var: NODEJS_HOME
    path: ""
  - var: NODE_PATH
    path: ""
