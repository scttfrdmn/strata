name: lmod
version: "8.7.37"
tier: core
description: "Lmod 8.7.37 — Lua-based environment modules system for multi-version software management."
abi: linux-gnu-2.34
provides:
  - name: lmod
    version: "8.7.37"
  - name: modules
    version: "8.7.37"
runtime_requires:
  - name: glibc
    min_version: "2.34"

modulefile_env:
  - var: LMOD_DIR
    path: "lmod/lmod/libexec"
