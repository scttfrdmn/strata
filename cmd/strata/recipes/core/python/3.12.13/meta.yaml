name: python
version: "3.12.13"
tier: core
description: "CPython interpreter version 3.12.13."
abi: linux-gnu-2.34
provides:
  - name: python
    version: "3.12.13"
runtime_requires:
  - name: glibc
    min_version: "2.34"

modulefile_env:
  - var: PYTHON
    path: "bin/python3"
  - var: PYTHONHOME
    path: ""
