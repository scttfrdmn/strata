name: julia
version: "1.11.3"
tier: application
description: "Julia 1.11.3 — high-performance scientific computing language with native MPI and GPU support."
abi: linux-gnu-2.34
provides:
  - name: julia
    version: "1.11.3"
runtime_requires:
  - name: glibc
    min_version: "2.34"

modulefile_env:
  - var: JULIA_HOME
    path: ""
  - var: JULIA_BINDIR
    path: "bin"
