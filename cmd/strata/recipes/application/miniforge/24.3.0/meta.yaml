name: miniforge
version: "24.3.0"
tier: application
description: "Miniforge conda distribution version 24.3.0 with mamba solver."
abi: linux-gnu-2.34
provides:
  - name: miniforge
    version: "24.3.0"
  - name: conda
    version: "24.3.0"
  - name: mamba
    version: "1.5.8"
runtime_requires:
  - name: glibc
    min_version: "2.34"

modulefile_env:
  - var: CONDA_PREFIX
    path: ""
