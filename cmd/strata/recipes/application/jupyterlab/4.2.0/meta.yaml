name: jupyterlab
version: "4.2.0"
tier: application
description: "JupyterLab interactive development environment version 4.2.0."
abi: linux-gnu-2.34
provides:
  - name: jupyterlab
    version: "4.2.0"
  - name: jupyter
    version: "4.2.0"
build_requires:
  - name: python
    min_version: "3.11"
runtime_requires:
  - name: glibc
    min_version: "2.34"
  - name: python
    min_version: "3.11"

modulefile_env:
  - var: JUPYTERLAB_HOME
    path: ""
