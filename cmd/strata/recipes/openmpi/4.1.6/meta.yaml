name: openmpi
version: "4.1.6"
description: "Open MPI message passing interface library version 4.1.6."
family: rhel
provides:
  - name: openmpi
    version: "4.1.6"
  - name: mpi
    version: "3.1"
build_requires:
  - name: gcc
    min_version: "13"
  - name: gfortran
    min_version: "13"
runtime_requires:
  - name: glibc
    min_version: "2.34"
