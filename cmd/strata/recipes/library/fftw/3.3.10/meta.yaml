name: fftw
version: "3.3.10"
tier: library
description: "FFTW 3.3.10 — fast Fourier transform library required by GROMACS, WRF, NAMD, and numpy."
abi: linux-gnu-2.34

build_requires:
  - name: gcc
    min_version: "13"

provides:
  - name: fftw
    version: "3.3.10"

runtime_requires:
  - name: glibc
    min_version: "2.34"

modulefile_env:
  - var: FFTW_HOME
    path: ""
