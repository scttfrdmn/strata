name: pmix
version: "5.0.3"
tier: library
description: "PMIx 5.0.3 — process management interface for MPI runtimes."
abi: linux-gnu-2.34
user_selectable: false

build_requires:
  - name: gcc
    min_version: "13"
  - name: hwloc
    min_version: "2"

provides:
  - name: pmix
    version: "5.0.3"
  - name: pmix
    version: "5"

runtime_requires:
  - name: glibc
    min_version: "2.34"
  - name: hwloc
    min_version: "2"

modulefile_env:
  - var: PMIX_HOME
    path: ""
