name: libfabric
version: "1.22.0"
tier: library
description: "libfabric 1.22.0 — OFI fabric layer for EFA, Slingshot, and InfiniBand."
abi: linux-gnu-2.34
user_selectable: false

build_requires:
  - name: gcc
    min_version: "13"

provides:
  - name: libfabric
    version: "1.22.0"
  - name: libfabric
    version: "1"

runtime_requires:
  - name: glibc
    min_version: "2.34"

modulefile_env:
  - var: LIBFABRIC_HOME
    path: ""
