name: ucx
version: "1.17.0"
tier: library
description: "Unified Communication X 1.17.0 — high-performance networking transport for MPI."
abi: linux-gnu-2.34
user_selectable: false

build_requires:
  - name: gcc
    min_version: "13"

provides:
  - name: ucx
    version: "1.17.0"
  - name: ucx
    version: "1"

runtime_requires:
  - name: glibc
    min_version: "2.34"

modulefile_env:
  - var: UCX_HOME
    path: ""
