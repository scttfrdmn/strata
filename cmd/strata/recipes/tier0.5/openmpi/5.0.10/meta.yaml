name: openmpi
version: "5.0.10"
tier: "0.5"
description: "Open MPI 5.0.10 — MPI-4.0 compliant message passing library."
family: rhel

build_requires:
  - name: gcc
    min_version: "13"
  - name: ucx
    min_version: "1"
  - name: hwloc
    min_version: "2"
  - name: pmix
    min_version: "5"
  - name: libfabric
    min_version: "1"

provides:
  - name: openmpi
    version: "5.0.10"
  - name: mpi
    version: "4.0"

runtime_requires:
  - name: glibc
    min_version: "2.34"
  - name: ucx
    min_version: "1"
  - name: hwloc
    min_version: "2"
  - name: pmix
    min_version: "5"
  - name: libfabric
    min_version: "1"
