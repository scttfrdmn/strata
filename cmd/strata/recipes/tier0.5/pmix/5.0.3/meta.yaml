name: pmix
version: "5.0.3"
tier: "0.5"
description: "PMIx 5.0.3 — process management interface for MPI runtimes."
family: rhel

build_requires:
  - name: gcc
    min_version: "13"
  - name: hwloc
    min_version: "2"

provides:
  - name: pmix
    version: "5.0.3"
  - name: pmix
    version: "5"

runtime_requires:
  - name: glibc
    min_version: "2.34"
  - name: hwloc
    min_version: "2"
