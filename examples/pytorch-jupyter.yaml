name: pytorch-jupyter
description: PyTorch with JupyterLab for interactive GPU experimentation
version: "1.0"

base:
  os: al2023
  arch: x86_64

software:
  - formation: jupyter-gpu@2024.03
  - name: pytorch
    version: "2.2"

instance:
  type: g5.4xlarge
  spot: true
  spot_fallback: g4dn.4xlarge

storage:
  - type: s3
    bucket: my-training-data
    mount: /data
    read_only: true
  - type: ebs
    mount: /checkpoints

env:
  TORCH_HOME: /checkpoints/torch-cache

on_ready:
  - jupyter lab --no-browser --port 8888 &
